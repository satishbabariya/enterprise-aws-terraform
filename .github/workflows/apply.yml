name: Terraform Apply

# Manual-trigger only. Auto-apply on push to main is intentionally disabled -
# infrastructure changes should require human review of the PR plan first.
# Run via:
#   GitHub UI: Actions tab -> Terraform Apply -> Run workflow
#   gh CLI:    gh workflow run "Terraform Apply" --field scale=medium
on:
  workflow_dispatch:
    inputs:
      scale:
        description: "Which deployment to apply"
        required: true
        type: choice
        default: medium
        options:
          - medium
          - large
      confirm:
        description: "Type APPLY to confirm (defense against accidental dispatch)"
        required: true
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.confirm == 'APPLY'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.MANAGEMENT_ACCOUNT_ID }}:role/acme-management-terraform-ci
          aws-region: us-east-1

      - name: Apply accounts in dependency order
        run: |
          set -e

          case "${{ github.event.inputs.scale }}" in
            medium)
              ACCOUNTS=(
                "medium/accounts/management"
                "medium/accounts/log-archive"
                "medium/accounts/security"
                "medium/accounts/network"
                "medium/accounts/shared-services"
                "medium/accounts/prod"
                "medium/accounts/staging"
                "medium/accounts/dev"
                "medium/accounts/sandbox"
              )
              ;;
            large)
              ACCOUNTS=(
                "large/accounts/management"
                "large/accounts/log-archive"
                "large/accounts/security"
                "large/accounts/network"
                "large/accounts/shared-services"
                "large/accounts/data-platform"
                "large/accounts/security-tools"
                "large/accounts/bu-alpha/dev"
                "large/accounts/bu-alpha/staging"
                "large/accounts/bu-alpha/prod"
                "large/accounts/bu-beta/dev"
                "large/accounts/bu-beta/staging"
                "large/accounts/bu-beta/prod"
              )
              ;;
            *)
              echo "Unknown scale: ${{ github.event.inputs.scale }}"
              exit 1
              ;;
          esac

          for dir in "${ACCOUNTS[@]}"; do
            echo "=== Applying $dir ==="
            cd "$dir"
            terraform init -input=false
            terraform apply -auto-approve -input=false
            cd "$GITHUB_WORKSPACE"
          done
